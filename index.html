<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유통기한 검사하기</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --accent-color: #007bff;
            --notice-bg: #e9ecef; /* 회색 음영 */
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            color: #111;
            font-weight: 700;
            margin-bottom: -4px;
        }

        /* [표기영역] 오늘의 날짜 */
        .date-box {
            text-align: center;
            background: #f1f3f5;
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 700;
            color: #495057;
        }

        /* [표기영역] 카테고리별 계산 결과 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .info-card {
            background: #fff;
            border: 1px solid #dee2e6;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .info-card .label {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .info-card .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* [표기영역] 오늘의 식품 유통기한 항목 */
        .today-task-box {
            background: #f8f9fa;
            border: 2px solid var(--accent-color);
            padding: 14px;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .today-task-box .label {
            font-size: 0.85rem;
            color: #495057;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .today-task-box .value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #111;
        }

        /* [표기영역] 회색 음영 Notice 스타일의 요일별 검사항목 */
        .notice-box {
            background-color: var(--notice-bg);
            border-radius: var(--border-radius);
            padding: 14px 16px;
        }

        .notice-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #495057;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .notice-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .notice-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #495057;
            padding: 2px 0;
        }

        /* 오늘 요일 하이라이트 효과 */
        .notice-item.active {
            color: var(--accent-color);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 타이틀 -->
        <h1>유통기한 검사하기</h1>

        <!-- [표기영역] 오늘의 날짜 -->
        <div class="date-box" id="current-date">-</div>

        <!-- [표기영역] 카테고리별 유통기한 말일 계산 -->
        <div class="grid-container">
            <div class="info-card">
                <div class="label">식품 (+3개월)</div>
                <div class="value" id="food-expiry">-</div>
            </div>
            <div class="info-card">
                <div class="label">건강식품 (+6개월)</div>
                <div class="value" id="health-expiry">-</div>
            </div>
            <div class="info-card">
                <div class="label">비식품 (+18개월)</div>
                <div class="value" id="nonfood-expiry">-</div>
            </div>
            <div class="info-card">
                <div class="label">의료기기 (+24개월)</div>
                <div class="value" id="medical-expiry">-</div>
            </div>
        </div>

        <!-- [표기영역] 오늘의 요일에 맞는 식품 유통기한 표기 -->
        <div class="today-task-box">
            <div class="label">식품 유통기한 (오늘의 항목)</div>
            <div class="value" id="today-task">-</div>
        </div>

        <!-- [표기영역] 회색 음영 Notice 느낌의 요일별 검사항목 리스트 -->
        <div class="notice-box">
            <div class="notice-title">💡 요일별 검사항목 안내</div>
            <ul class="notice-list">
                <li class="notice-item" id="day-1"><span>월요일</span> <span>딜라이트</span></li>
                <li class="notice-item" id="day-2"><span>화요일</span> <span>과자</span></li>
                <li class="notice-item" id="day-3"><span>수요일</span> <span>스위츠</span></li>
                <li class="notice-item" id="day-4"><span>목요일</span> <span>음료</span></li>
                <li class="notice-item" id="day-5"><span>금요일</span> <span>이너뷰티 + 올더베러 덤빈</span></li>
                <li class="notice-item" id="day-6"><span>토요일</span> <span>라이트밀 + 구강캔디류</span></li>
                <li class="notice-item" id="day-0"><span>일요일</span> <span>건강식품</span></li>
            </ul>
        </div>
    </div>

    <script>
        // 요일별 데이터 매핑
        const weeklyTasks = {
            0: "건강식품",
            1: "딜라이트",
            2: "과자",
            3: "스위츠",
            4: "음료",
            5: "이너뷰티 + 올더베러 덤빈",
            6: "라이트밀 + 구강캔디류"
        };

        const dayNames = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];

        function initApp() {
            const today = new Date();
            const currentDayCode = today.getDay(); // 일요일: 0 ~ 토요일: 6

            // 1. 오늘의 날짜 및 요일 표시
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const dayOfWeek = dayNames[currentDayCode];
            document.getElementById('current-date').innerText = `${year}년 ${month}월 ${date}일 (${dayOfWeek})`;

            // 2. 카테고리별 유통기한 계산 ("26년 9월" 형식)
            document.getElementById('food-expiry').innerText = getExpiryFormat(today, 3);
            document.getElementById('health-expiry').innerText = getExpiryFormat(today, 6);
            document.getElementById('nonfood-expiry').innerText = getExpiryFormat(today, 18);
            document.getElementById('medical-expiry').innerText = getExpiryFormat(today, 24);

            // 3. 오늘의 요일에 맞는 항목 자동 표기
            document.getElementById('today-task').innerText = weeklyTasks[currentDayCode];

            // 4. 하단 Notice 영역에서 '오늘 요일'에 해당하는 줄 강조 표시
            const activeRow = document.getElementById(`day-${currentDayCode}`);
            if (activeRow) {
                activeRow.classList.add('active');
            }
        }

        // N개월 후 말일 기준의 연/월을 "YY년 M월" 형식으로 반환
        function getExpiryFormat(baseDate, addMonths) {
            const targetDate = new Date(baseDate.getFullYear(), baseDate.getMonth() + addMonths, 1);
            const targetYear = String(targetDate.getFullYear()).slice(-2); 
            const targetMonth = targetDate.getMonth() + 1;
            return `${targetYear}년 ${targetMonth}월`;
        }

        // 앱 실행
        initApp();
    </script>
</body>
</html>
